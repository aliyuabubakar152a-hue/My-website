<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: #333;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Welcome to My Website 🚀</h1>

<div class="card">
  <h3>Upload Image</h3>
  <input type="file" id="fileInput">
  <br><br>
  <button onclick="uploadImage()">Upload</button>
  <img id="preview">
</div>

<script>
function uploadImage() {
  const file = document.getElementById("fileInput").files[0];
  const preview = document.getElementById("preview");

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}
</script>

</body>
</html>
