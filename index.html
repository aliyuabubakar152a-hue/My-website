7<!DOCTYPE html>
<html>

<head>
  <title>Aliyu Abubakar Assalafy</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      text-align: center;
      background: linear-gradient(-45deg, #111, #333, #555, #111);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      color: white;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    nav {
      background: black;
      padding: 15px;
    }

    nav button {
      margin: 5px;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .page { display: none; }
    .active { display: block; }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }

    img, video {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Welcome 🚀</h1>
<div class="page" id="upload">
  <h2>Upload Media</h2>

  <input type="file" id="fileInput"><br>
  <button onclick="previewFile()">Upload</button>

  <div id="preview"></div>
</div>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('gallery')">Gallery</button>
  <button onclick="showPage('videos')">Videos</button>
  <button onclick="showPage('login')">Login</button>
  <button onclick="showPage('upload')">Upload</button>
</nav>

<div id="home" class="page active">
  <p>This is my website</p>
</div>

<div id="gallery" class="page">
  <div class="card">
    <img src="https://via.placeholder.com/300">
  </div>
</div>

<div id="videos" class="page">
  <div class="card">
    <video controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  </div>
</div>

<div id="login" class="page">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="loginUser()">Login</button>
</div>

<div id="upload" class="page">
  <input type="file" id="fileInput"><br>
  <button onclick="uploadFile()">Upload</button>
  <div id="preview"></div>
</div>

<!-- NORMAL JS -->
<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

<!-- FIREBASE (ONLY THIS) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTwSA_6pilZKinCnYuERTl9hTchJ24kQU",
  authDomain: "my-website-ae2e9.firebaseapp.com",
  projectId: "my-website-ae2e9",
  storageBucket: "my-website-ae2e9.appspot.com",
  messagingSenderId: "668903213158",
  appId: "1:668903213158:web:6ef6624b1784d8d335c5a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);

window.loginUser = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(()=>alert("Login success"))
    .catch(e=>alert(e.message));
};

window.uploadFile = function () {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  const storageRef = ref(storage, "uploads/" + file.name);

  uploadBytes(storageRef, file).then(()=>{
    getDownloadURL(storageRef).then(url=>{
      document.getElementById("preview").innerHTML =
        file.type.startsWith("image")
        ? `<img src="${url}">`
        : `<video controls src="${url}"></video>`;
    });
  });
};
window.uploadFile = function () {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  const storageRef = ref(storage, "uploads/" + Date.now() + "_" + file.name);

  uploadBytes(storageRef, file)
    .then(() => getDownloadURL(storageRef))
    .then(url => {
      document.getElementById("preview").innerHTML =
        file.type.startsWith("image")
        ? `<img src="${url}">`
        : `<video controls src="${url}"></video>`;
    })
    .catch(err => {
      console.error(err);
      alert("Upload failed: " + err.message);
    });
};
</script>

</body>
</html>
